<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب جديد</title>
    <style>
        /* مطابقة ألوان وخلفية صفحة index.html الرئيسية المعتمدة في النظام الأصلي */
        body {
            background-color: #0f172a; 
            color: #f8fafc;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* الحاوية الرئيسية لمنع أي تكرار أفقي للعناصر وجعلها في السنتر تماماً */
        .usr-reg-page-wrapper {
            width: 100%;
            max-width: 450px;
            padding: 20px;
            box-sizing: border-box;
        }

        /* حاوية النموذج المصممة بأسلوب بطاقات النظام الداكنة */
        .usr-reg-layout-box {
            width: 100%;
            padding: 40px;
            background: #1e293b; 
            border: 1px solid #334155;
            border-radius: 16px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3), 0 10px 10px -5px rgba(0, 0, 0, 0.2);
            box-sizing: border-box;
        }

        .usr-reg-layout-title {
            text-align: center;
            color: #ffffff;
            margin-bottom: 25px;
            font-size: 28px;
            font-weight: 700;
        }

        .usr-reg-field-group {
            margin-bottom: 20px;
        }

        .usr-reg-field-group label {
            display: block;
            margin-bottom: 8px;
            color: #94a3b8;
            font-weight: 500;
            font-size: 14px;
        }

        /* تصميم الحقول المتوافق مع حقول الإدخال في الصفحة الرئيسية */
        .usr-reg-input-component {
            width: 100%;
            padding: 12px 16px;
            background-color: #0f172a;
            border: 1px solid #334155;
            border-radius: 10px;
            color: #ffffff;
            box-sizing: border-box;
            font-size: 15px;
            transition: all 0.2s ease;
        }

        .usr-reg-input-component:focus {
            outline: none;
            border-color: #2ecc71; /* لون أخضر مريح عند التركيز لتمييز التسجيل */
            box-shadow: 0 0 0 2px rgba(46, 204, 113, 0.2);
        }

        /* زر التسجيل الرئيسي الأخضر المتوافق مع النظام */
        .usr-reg-action-btn {
            width: 100%;
            padding: 14px;
            background-color: #10b981;
            color: #ffffff;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s ease;
            margin-top: 10px;
        }

        .usr-reg-action-btn:hover {
            background-color: #059669;
        }

        .usr-reg-action-btn:active {
            transform: scale(0.98);
        }

        /* صندوق التنبيهات */
        .usr-reg-alert-status {
            margin-top: 20px;
            padding: 12px;
            border-radius: 8px;
            display: none;
            text-align: center;
            font-size: 15px;
            font-weight: 500;
        }

        /* روابط التنقل السفلي */
        .usr-reg-nav-link {
            display: block;
            text-align: center;
            margin-top: 25px;
            color: #38bdf8;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.2s ease;
        }

        .usr-reg-nav-link:hover {
            color: #7dd3fc;
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="usr-reg-page-wrapper">
    <div class="usr-reg-layout-box">
        <h2 class="usr-reg-layout-title">إنشاء حساب</h2>
        <form id="usrSignupForm">
            <div class="usr-reg-field-group">
                <label>اسم المستخدم</label>
                <input type="text" id="usrRegUsername" class="usr-reg-input-component" required autocomplete="username" placeholder="مثال: dana123">
            </div>
            <div class="usr-reg-field-group">
                <label>البريد الإلكتروني</label>
                <input type="email" id="usrRegEmail" class="usr-reg-input-component" required autocomplete="email" placeholder="example@mail.com">
            </div>
            <div class="usr-reg-field-group">
                <label>كلمة المرور</label>
                <input type="password" id="usrRegPass" class="usr-reg-input-component" required autocomplete="new-password" placeholder="••••••••">
            </div>
            <button type="submit" class="usr-reg-action-btn">إنشاء الحساب</button>
        </form>
        <div id="usrSignupMsg" class="usr-reg-alert-status"></div>
        <a href="login.html" class="usr-reg-nav-link">لديك حساب بالفعل؟ سجل دخولك الآن</a>
    </div>
</div>

<script>
    document.getElementById('usrSignupForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const username = document.getElementById('usrRegUsername').value;
        const email = document.getElementById('usrRegEmail').value;
        const password = document.getElementById('usrRegPass').value;
        const msgBox = document.getElementById('usrSignupMsg');

        try {
            const response = await fetch('/api/signup', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password }) // نرسل البيانات الأساسية لـ SQLite لحفظها بسلام
            });
            const data = await response.json();
            
            msgBox.style.display = 'block';
            if (response.ok) {
                msgBox.style.backgroundColor = 'rgba(34, 197, 94, 0.15)';
                msgBox.style.color = '#4ade80';
                msgBox.style.border = '1px solid rgba(74, 222, 128, 0.4)';
                msgBox.innerHTML = data.message;
                
                // الانتقال التلقائي لصفحة اللوجن بعد النجاح
                setTimeout(() => window.location.href = 'login.html', 1500);
            } else {
                msgBox.style.backgroundColor = 'rgba(239, 68, 68, 0.15)';
                msgBox.style.color = '#f87171';
                msgBox.style.border = '1px solid rgba(248, 113, 113, 0.4)';
                msgBox.innerHTML = data.error;
            }
        } catch (err) {
            console.error(err);
        }
    });
</script>
</body>
</html>
